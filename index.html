<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云计算器</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 2rem auto; padding: 0 1rem; }
        input, select, button { width: 100%; padding: 0.5rem; margin-top: 0.5rem; }
        #result { font-size: 1.5rem; color: #333; margin: 1rem 0; text-align: center; }
        #history-list { list-style: none; padding: 0; }
        #history-list li { background: #f4f4f4; margin-bottom: 0.5rem; padding: 0.5rem; border-radius: 4px; font-size: 0.9rem; }
        .time { color: #666; font-size: 0.8rem; float: right; }
    </style>
</head>
<body>

    <h1>☁️ 云计算器</h1>

    <div>
        <input type="number" id="num1" placeholder="输入第一个数字">
        
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">×</option>
            <option value="/">÷</option>
        </select>

        <input type="number" id="num2" placeholder="输入第二个数字">
        
        <button onclick="doCalculate()">计算</button>
    </div>

    <div id="result">结果将显示在这里</div>

    <h3>历史记录</h3>
    <ul id="history-list">
        <!-- 历史记录将插入到这里 -->
    </ul>

    <script>
        const API_URL = 'https://2399443871.pythonanywhere.com/api';

        // 执行计算
        async function doCalculate() {
            // 1. 获取输入值
            const val1 = parseFloat(document.getElementById('num1').value);
            const val2 = parseFloat(document.getElementById('num2').value);
            const operator = document.getElementById('operator').value;

            if (isNaN(val1) || isNaN(val2)) {
                alert("请输入有效的数字！");
                return;
            }

            try {
                // 2. 发送 POST 请求到后端
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    // 发送 num1, num2 和 operator
                    body: JSON.stringify({ 
                        num1: val1, 
                        num2: val2, 
                        operator: operator 
                    })
                });

                const data = await response.json();

                // 3. 显示结果
                if (data.error) {
                    document.getElementById('result').innerText = "错误: " + data.error;
                } else {
                    document.getElementById('result').innerText = "结果: " + data.result;
                }

                // 4. 重新加载历史记录
                loadHistory();

            } catch (error) {
                console.error("请求失败:", error);
                document.getElementById('result').innerText = "连接服务器失败";
            }
        }

        // 加载历史记录
        async function loadHistory() {
            try {
                // 1. 发送 GET 请求获取历史
                const response = await fetch(API_URL);
                const history = await response.json();

                const list = document.getElementById('history-list');
                list.innerHTML = ''; // 清空当前列表

                // 2. 遍历返回的数组
                // 假设后端返回的是 [{time: "...", detail: "..."}, ...]
                history.forEach(item => {
                    const li = document.createElement('li');
                    
                    // 格式化显示内容
                    // 如果后端返回的是字符串数组，直接显示 item
                    // 如果返回的是对象，显示 item.detail 和 item.time
                    if (typeof item === 'object') {
                        li.innerHTML = `<span>${item.detail}</span><span class="time">${item.time}</span>`;
                    } else {
                        li.innerText = item;
                    }
                    
                    list.appendChild(li);
                });

            } catch (error) {
                console.error("加载历史失败:", error);
            }
        }

        // 页面加载完成后立即获取一次历史记录
        window.onload = loadHistory;
    </script>

</body>
</html>
